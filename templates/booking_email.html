<!DOCTYPE html>
<html>
<head>
<title>Booking Form</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#e8f4ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:450px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,.2);

}

h2{
text-align:center;
margin-bottom:20px;
color:#0066cc;
}

input,
select{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;

}

button{

width:100%;
padding:13px;
background:#0066cc;
color:white;
border:none;
font-size:17px;
cursor:pointer;
border-radius:6px;
margin-top:10px;

}

button:hover{

background:#004d99;

}

.success{

color:green;
text-align:center;
font-weight:bold;
margin-bottom:10px;

}

</style>

</head>

<body>

<div class="container">

<h2>Book Now</h2>

{% if message %}
<p class="success">{{message}}</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<select name="service">

<option>Houseboat</option>

<option>Kayaking</option>

<option>Ayurvedic Spa</option>

</select>

<input type="date" name="date" required>

<input type="number" name="guests" placeholder="Guests" required>

<button type="submit">
Book Now
</button>

</form>

</div>

</body>
</html>
